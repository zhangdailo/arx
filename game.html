<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARX — The Grid</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#050010;
    font-family:'Courier New',Courier,monospace;color:#e0aaff}
  #gameCanvas{position:fixed;inset:0;display:block;width:100%;height:100%}

  #greeting{position:fixed;top:22px;left:28px;z-index:20;pointer-events:none}
  .greet-line1{font-size:11px;letter-spacing:.25em;color:rgba(168,85,247,.55);text-transform:uppercase}
  .greet-name{font-size:20px;letter-spacing:.18em;font-weight:700;color:#c084fc;
    text-shadow:0 0 18px rgba(168,85,247,.8);margin-top:3px}

  #controls{position:fixed;bottom:22px;left:28px;z-index:20;pointer-events:none;
    font-size:9px;letter-spacing:.15em;color:rgba(168,85,247,.35);line-height:2}

  #flyBadge{position:fixed;top:22px;right:200px;z-index:20;pointer-events:none;
    font-size:9px;letter-spacing:.22em;padding:4px 10px;
    border:1px solid rgba(168,85,247,.5);color:#c084fc;
    background:rgba(168,85,247,.12);display:none;
    animation:flyPulse 1s ease-in-out infinite alternate}
  @keyframes flyPulse{from{box-shadow:0 0 6px rgba(168,85,247,.4)}to{box-shadow:0 0 18px rgba(168,85,247,.9)}}

  #scoreBoard{position:fixed;top:22px;left:50%;transform:translateX(-50%);
    z-index:20;pointer-events:none;display:flex;gap:40px;align-items:center}
  .score-side{text-align:center}
  .score-label{font-size:8px;letter-spacing:.25em;color:rgba(168,85,247,.45);margin-bottom:3px}
  .score-num{font-size:28px;font-weight:700;color:#c084fc;letter-spacing:.1em;
    text-shadow:0 0 16px rgba(168,85,247,.8);transition:transform .15s}
  .score-num.pop{transform:scale(1.5)}
  .score-div{font-size:12px;color:rgba(168,85,247,.25);letter-spacing:.1em}

  /* Vault */
  #vaultWrap{position:fixed;bottom:28px;right:32px;z-index:30;
    cursor:pointer;user-select:none;animation:vaultFloat 3s ease-in-out infinite}
  #vaultWrap:hover{animation:none;transform:scale(1.07)}
  @keyframes vaultFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  #vaultLabel{text-align:center;margin-bottom:8px;
    font-size:9px;letter-spacing:.28em;color:rgba(168,85,247,.65);text-transform:uppercase}
  #vaultSvg{display:block;filter:drop-shadow(0 0 16px rgba(168,85,247,.7)) drop-shadow(0 0 40px rgba(124,58,237,.4))}
  .vr1{transform-origin:60px 60px;animation:vSpin 8s linear infinite}
  .vr2{transform-origin:60px 60px;animation:vSpin 14s linear infinite reverse}
  .vr3{transform-origin:60px 60px;animation:vSpin 5s linear infinite}
  @keyframes vSpin{to{transform:rotate(360deg)}}
  .vPulse{animation:vP 2s ease-in-out infinite}
  @keyframes vP{0%,100%{opacity:.6}50%{opacity:1}}

  #vaultOverlay{position:fixed;inset:0;z-index:100;background:#050010;
    opacity:0;pointer-events:none;transition:opacity .8s}
  #vaultOverlay.open{opacity:1;pointer-events:all}
  #vaultCenter{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
  .vc-title{font-size:clamp(20px,4vw,44px);letter-spacing:.42em;font-weight:700;
    background:linear-gradient(135deg,#a855f7,#c084fc,#a855f7);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 18px rgba(168,85,247,1));animation:gTxt 1s ease-in-out infinite alternate}
  @keyframes gTxt{from{filter:drop-shadow(0 0 10px rgba(168,85,247,.6))}to{filter:drop-shadow(0 0 30px rgba(168,85,247,1))}}
  .vc-sub{font-size:10px;letter-spacing:.3em;color:rgba(168,85,247,.55);margin-top:10px}
  #vcBar{width:280px;height:2px;background:rgba(168,85,247,.12);margin:20px auto 0;overflow:hidden}
  #vcFill{height:100%;width:0;background:linear-gradient(90deg,#7c3aed,#c084fc);
    box-shadow:0 0 8px #a855f7;transition:width 1.8s ease}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="greeting">
  <div class="greet-line1">Welcome, Operator</div>
  <div class="greet-name" id="opName">—</div>
</div>

<div id="scoreBoard">
  <div class="score-side">
    <div class="score-label">LEFT HOOP</div>
    <div class="score-num" id="scoreL">0</div>
  </div>
  <div class="score-div">VS</div>
  <div class="score-side">
    <div class="score-label">RIGHT HOOP</div>
    <div class="score-num" id="scoreR">0</div>
  </div>
</div>

<div id="flyBadge">⬡ FLIGHT MODE</div>

<div id="controls">
  ← → MOVE &nbsp;·&nbsp; SPACE JUMP &nbsp;·&nbsp; DBL-SPACE FLY &nbsp;·&nbsp; ↑↓ WHILE FLYING<br>
  F / CLICK TO THROW BALL &nbsp;·&nbsp; SCROLL TO MOVE
</div>

<div id="vaultWrap" title="Enter the ARX Dashboard">
  <div id="vaultLabel">ENTER THE ARX</div>
  <svg id="vaultSvg" viewBox="0 0 120 120" width="110" height="110" xmlns="http://www.w3.org/2000/svg">
    <g class="vr1">
      <circle cx="60" cy="60" r="55" fill="none" stroke="#4c1d95" stroke-width="1.5" stroke-dasharray="8 5"/>
      <rect x="57" y="4"   width="6" height="6" fill="#a855f7" transform="rotate(45 60 7)"   opacity=".9"/>
      <rect x="57" y="109" width="6" height="6" fill="#a855f7" transform="rotate(45 60 112)" opacity=".9"/>
      <rect x="4"  y="57"  width="6" height="6" fill="#a855f7" transform="rotate(45 7  60)"  opacity=".9"/>
      <rect x="109" y="57" width="6" height="6" fill="#a855f7" transform="rotate(45 112 60)" opacity=".9"/>
    </g>
    <g class="vr2">
      <circle cx="60" cy="60" r="43" fill="none" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4 7"/>
      <line x1="60" y1="17" x2="60" y2="26" stroke="#c084fc" stroke-width="1.8"/>
      <line x1="60" y1="94" x2="60" y2="103" stroke="#c084fc" stroke-width="1.8"/>
      <line x1="17" y1="60" x2="26" y2="60" stroke="#c084fc" stroke-width="1.8"/>
      <line x1="94" y1="60" x2="103" y2="60" stroke="#c084fc" stroke-width="1.8"/>
    </g>
    <g class="vr3">
      <circle cx="60" cy="60" r="30" fill="none" stroke="#a855f7" stroke-width=".8" stroke-dasharray="3 6"/>
    </g>
    <circle cx="60" cy="60" r="22" fill="rgba(8,0,22,.9)" stroke="#a855f7" stroke-width="1.5"/>
    <text x="60" y="65" text-anchor="middle" fill="#c084fc"
          font-family="'Courier New',monospace" font-size="8" font-weight="700" letter-spacing="3">ARX</text>
    <circle class="vPulse" cx="60" cy="60" r="6" fill="rgba(168,85,247,.3)" stroke="#a855f7" stroke-width=".8">
      <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite"/>
    </circle>
  </svg>
</div>

<div id="vaultOverlay">
  <div id="vaultCenter">
    <div class="vc-title">ENTERING THE ARX</div>
    <div class="vc-sub" id="vcSub">LOADING COMMAND BRIDGE</div>
    <div id="vcBar"><div id="vcFill"></div></div>
  </div>
</div>

<script>
// ── Auth guard ────────────────────────────────────────────────────────
const _auth = (()=>{
  try{ const s=JSON.parse(sessionStorage.getItem('arx_auth')||'');
    if(s&&s.uid&&Date.now()-s.ts<8*3600000) return s;
  }catch(e){}
  window.location.replace('login.html'); return null;
})();
if(_auth) document.getElementById('opName').textContent = _auth.uid.toUpperCase();

// ── Canvas ────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
let W, H;
function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  hero.y = GROUND() - hero.h;
  hoops[0].sx = 88;
  hoops[1].sx = W - 88;
  hoops[0].maxY = H * 0.72;
  hoops[1].maxY = H * 0.72;
}
window.addEventListener('resize', resize);

// ── World ─────────────────────────────────────────────────────────────
const WORLD_W = 6000;
const GROUND  = () => H - 90;
const PARALLAX = [0.08, 0.22, 0.55];
let camX = 0;
function updateCamera(){
  const target = hero.x - W * 0.35;
  camX += (target - camX) * 0.06;
  camX  = Math.max(0, Math.min(WORLD_W - W, camX));
}
function worldToScreen(wx){ return wx - camX; }

// ── Matrix rain — "WELCOME" in every language ─────────────────────────
// Characters sourced from "welcome" words across languages
const WELCOME_CHARS =
  // Korean: 환영합니다 (welcome) + 어서오세요 (please come in)
  '환영합니다어서오세요받안녕오' +
  // Vietnamese: CHÀO MỪNG BẠN ĐẾN
  'CHÀOMỪNGBẠNĐẾNchàomừngbạnđến' +
  // Vietnamese diacritics pool
  'àáảãạăắằẳẵặâấầẩẫậđèéẻẽẹêếềểễệỉịốồổỗộớờởỡợụứừửữựỳỷỹỵ' +
  // Indonesian: SELAMAT DATANG
  'SELAMATDATANG' +
  // More: WELCOME BIENVENUE WILLKOMMEN BIENVENIDO BENVENUTO
  'WELCOMEBIENVENUEWILLKOMMENBIENVENIDOBENVENUTO' +
  // Tagalog: MALIGAYANG PAGDATING
  'MALIGAYANG' +
  // Digits + symbols
  '0123456789@#$%&*|~^';

const rainCanvas = document.createElement('canvas');
const rainCtx    = rainCanvas.getContext('2d');
const FS = 13;
let rainCols = [];

function initRain(){
  rainCanvas.width = W; rainCanvas.height = H;
  rainCtx.fillStyle = '#050010';
  rainCtx.fillRect(0,0,W,H);
  const n = Math.ceil(W / FS);
  rainCols = Array.from({length:n},(_,i)=>({
    x: i * FS,
    y: Math.random() * -H / FS,
    speed: 0.3 + Math.random() * 1.4,
    bright: Math.random() > 0.65,
    layer: Math.floor(Math.random() * 3),
  }));
}

function stepRain(){
  rainCtx.fillStyle = 'rgba(5,0,16,0.06)';
  rainCtx.fillRect(0,0,W,H);
  rainCtx.font = FS + 'px monospace';
  const alphas = [0.15, 0.35, 0.62];
  rainCols.forEach(c=>{
    const g = WELCOME_CHARS[Math.floor(Math.random() * WELCOME_CHARS.length)];
    const a = alphas[c.layer] * (c.bright ? 1.4 : 0.65);
    rainCtx.fillStyle = c.bright
      ? `rgba(224,170,255,${Math.min(a,.92)})`
      : `rgba(100,20,180,${Math.min(a,.55)})`;
    rainCtx.fillText(g, c.x, c.y * FS);
    c.y += c.speed;
    if(c.y * FS > H + 10){ c.y = -2; c.bright = Math.random() > 0.65; }
  });
}

// ── Hero ──────────────────────────────────────────────────────────────
const hero = {
  x:250, y:0, vx:0, vy:0,
  w:28, h:72,
  onGround:false,
  facing:1,
  state:'idle',
  frame:0,
  kickTimer:0,
};

function drawHero(){
  const f  = hero.frame;
  const isW = hero.state === 'walk';
  const isJ = hero.state === 'jump';
  const sx  = worldToScreen(hero.x + hero.w/2);
  const sy  = hero.y + hero.h;

  ctx.save();
  ctx.translate(sx, sy);
  if(hero.facing === -1) ctx.scale(-1,1);

  ctx.shadowBlur  = isFlying ? 30 : 18;
  ctx.shadowColor = isFlying ? 'rgba(224,170,255,.9)' : 'rgba(168,85,247,.7)';

  const sway = isW ? Math.sin(f*.25)*7 : Math.sin(f*.05)*1.5;

  // Coat flaps
  ctx.fillStyle='#10002e';
  ctx.beginPath(); ctx.moveTo(-9,-28); ctx.lineTo(-14-sway*.5,0); ctx.lineTo(-5,0); ctx.lineTo(-7,-28); ctx.fill();
  ctx.beginPath(); ctx.moveTo(7,-28); ctx.lineTo(5,0); ctx.lineTo(14+sway*.5,0); ctx.lineTo(9,-28); ctx.fill();

  // Legs
  const ls = isW ? Math.sin(f*.28)*18 : 0;
  const le = isJ ? -14 : 0;
  ctx.save(); ctx.translate(-5,-28); ctx.rotate((ls+le)*Math.PI/180);
  ctx.fillStyle='#0a001e'; ctx.fillRect(-3,0,6,28); ctx.restore();
  ctx.save(); ctx.translate(5,-28); ctx.rotate((-ls+le)*Math.PI/180);
  ctx.fillStyle='#0a001e'; ctx.fillRect(-3,0,6,28); ctx.restore();

  // Body
  ctx.fillStyle='#10002e';
  ctx.beginPath(); ctx.moveTo(-10,-62); ctx.lineTo(10,-62); ctx.lineTo(9,-28); ctx.lineTo(-9,-28); ctx.closePath(); ctx.fill();

  // Arms
  let ra = isW ? -Math.sin(f*.28)*22 : 0;
  if(hero.state==='kick') ra = -55 - hero.kickTimer * 1.5;
  ctx.save(); ctx.translate(9,-55); ctx.rotate(ra*Math.PI/180);
  ctx.fillStyle='#10002e'; ctx.fillRect(-2,0,5,20); ctx.restore();
  const la = isW ? Math.sin(f*.28)*22 : 0;
  ctx.save(); ctx.translate(-9,-55); ctx.rotate(-la*Math.PI/180);
  ctx.fillStyle='#10002e'; ctx.fillRect(-3,0,5,20); ctx.restore();

  // Head
  ctx.shadowBlur=10; ctx.fillStyle='#10002e';
  ctx.beginPath(); ctx.arc(0,-75,9,0,Math.PI*2); ctx.fill();

  // Sunglasses
  ctx.shadowColor='#a855f7'; ctx.shadowBlur = isFlying ? 14 : 7;
  ctx.fillStyle='#a855f7'; ctx.fillRect(-8,-78,6,3); ctx.fillRect(2,-78,6,3);
  ctx.fillStyle='rgba(168,85,247,.5)'; ctx.fillRect(-1,-78,3,3);

  // Collar
  ctx.shadowBlur=0; ctx.fillStyle='#1a0040'; ctx.fillRect(-10,-65,20,5);

  // Flight trail particles
  if(isFlying && (Math.abs(hero.vx)>1||Math.abs(hero.vy)>1)){
    for(let i=0;i<3;i++){
      const px = (Math.random()-0.5)*14;
      const py = Math.random()*10+2;
      ctx.fillStyle=`rgba(168,85,247,${Math.random()*.5})`;
      ctx.beginPath(); ctx.arc(px,py,Math.random()*3+1,0,Math.PI*2); ctx.fill();
    }
  }

  ctx.restore();
}

// ── Ground ────────────────────────────────────────────────────────────
function drawGround(){
  const g = GROUND();
  const grad = ctx.createLinearGradient(0,g,0,g+50);
  grad.addColorStop(0,'rgba(168,85,247,.3)'); grad.addColorStop(1,'rgba(168,85,247,0)');
  ctx.fillStyle=grad; ctx.fillRect(0,g,W,50);
  ctx.strokeStyle='rgba(168,85,247,.45)'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(0,g); ctx.lineTo(W,g); ctx.stroke();
  ctx.strokeStyle='rgba(168,85,247,.07)'; ctx.lineWidth=.6;
  const step=80, offset=(camX*.3)%step;
  for(let x=-offset;x<W+step;x+=step){
    ctx.beginPath(); ctx.moveTo(x,g); ctx.lineTo(x-40,H); ctx.stroke();
  }
}

// ── World decorations ─────────────────────────────────────────────────
const LABELS = [
  {wx:600,wy:-60,text:'TRADER RADAR',col:'rgba(168,85,247,.3)'},
  {wx:1200,wy:-80,text:'LIVE SIGNALS',col:'rgba(192,132,252,.35)'},
  {wx:1900,wy:-50,text:'MARKET OI',col:'rgba(168,85,247,.3)'},
  {wx:2600,wy:-70,text:'DAILOPULSE',col:'rgba(124,58,237,.4)'},
  {wx:3200,wy:-55,text:'HYPERLIQUID',col:'rgba(168,85,247,.3)'},
  {wx:3900,wy:-75,text:'WHALE TRACKER',col:'rgba(192,132,252,.35)'},
  {wx:4600,wy:-60,text:'FUNDING MAP',col:'rgba(168,85,247,.3)'},
];
const DECOR=[];
for(let i=0;i<80;i++) DECOR.push({
  wx:Math.random()*WORLD_W, wy:-(Math.random()*(H*.7)),
  size:Math.random()*3+1, speed:(Math.random()-.5)*.3,
  vy:(Math.random()-.5)*.2, a:Math.random()*.4+.1,
  layer:Math.floor(Math.random()*3),
});
const PILLARS=[400,900,1500,2100,2800,3400,4000,4700,5200];

function drawWorld(frame){
  const g=GROUND();
  PILLARS.forEach(wx=>{
    const px=wx-camX*(1-PARALLAX[1]);
    if(px<-60||px>W+60) return;
    const gh=120+Math.sin(wx*.003)*40;
    const grad=ctx.createLinearGradient(px,g-gh,px,g);
    grad.addColorStop(0,'rgba(168,85,247,0)');
    grad.addColorStop(.3,'rgba(80,20,160,.12)');
    grad.addColorStop(1,'rgba(168,85,247,.06)');
    ctx.fillStyle=grad; ctx.fillRect(px-18,g-gh,36,gh);
    ctx.strokeStyle='rgba(168,85,247,.15)'; ctx.lineWidth=.8;
    ctx.strokeRect(px-18,g-gh,36,gh);
  });
  ctx.font='9px Courier New';
  LABELS.forEach(l=>{
    const px=l.wx-camX*PARALLAX[0];
    if(px<-200||px>W+200) return;
    const py=g+l.wy+Math.sin(frame*.008+l.wx*.001)*12;
    ctx.fillStyle=l.col; ctx.fillText(l.text,px,py);
  });
  DECOR.forEach(d=>{
    d.wx+=d.speed; d.wy+=d.vy;
    if(d.wx>WORLD_W) d.wx=0; if(d.wx<0) d.wx=WORLD_W;
    const px=d.wx-camX*PARALLAX[d.layer];
    const py=g+d.wy;
    if(px<0||px>W) return;
    ctx.fillStyle=`rgba(168,85,247,${d.a})`;
    ctx.fillRect(px-d.size/2,py-d.size/2,d.size,d.size);
  });
  [.25,.45,.65].forEach((frac,i)=>{
    const y=g*frac;
    const off=(camX*PARALLAX[1]+frame*(.4+i*.2))%200;
    for(let x=-off;x<W;x+=200){
      ctx.strokeStyle=`rgba(124,58,237,${.04+Math.sin(frame*.02+i)*.02})`;
      ctx.lineWidth=.6;
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+120,y); ctx.stroke();
    }
  });
}

// ══════════════════════════════════════════════════════════════════════
// BASKETBALL SYSTEM
// ══════════════════════════════════════════════════════════════════════

const HOOP_R  = 26;  // rim radius
const BALL_R  = 10;  // ball radius
const balls   = [];
let   scores  = { left:0, right:0 };
const scoreEls = {
  left:  document.getElementById('scoreL'),
  right: document.getElementById('scoreR'),
};

// Hoops — screen-space, oscillate vertically
const hoops = [
  { sx:88, sy:0, vy:0.9, dir:1, minY:0, maxY:0,
    scored:false, scoreTimer:0, side:'left',  armDir:1 },
  { sx:0,  sy:0, vy:0.7, dir:-1, minY:0, maxY:0,
    scored:false, scoreTimer:0, side:'right', armDir:-1 },
];

function initHoops(){
  hoops[0].sx  = 88;
  hoops[1].sx  = W - 88;
  hoops[0].sy  = H * 0.38;
  hoops[1].sy  = H * 0.48;
  hoops[0].minY = H * 0.15;
  hoops[0].maxY = H * 0.72;
  hoops[1].minY = H * 0.15;
  hoops[1].maxY = H * 0.72;
}

function updateHoops(){
  hoops[1].sx = W - 88;
  hoops.forEach(h=>{
    h.sy += h.vy * h.dir;
    if(h.sy > h.maxY || h.sy < h.minY) h.dir *= -1;
    if(h.scoreTimer > 0) h.scoreTimer--;
    else h.scored = false;
  });
}

function drawHoop(h){
  const x = h.sx, y = h.sy;
  const ad = h.armDir; // +1 = arm extends right (left hoop), -1 = left (right hoop)
  const rimX = x + ad * 30;
  const rimY = y;

  ctx.save();

  // Backboard glow when scored
  if(h.scoreTimer > 0){
    ctx.shadowBlur  = 40;
    ctx.shadowColor = '#c084fc';
  }

  // Backboard
  ctx.fillStyle   = 'rgba(230,220,255,0.88)';
  ctx.strokeStyle = 'rgba(168,85,247,.7)';
  ctx.lineWidth   = 1.5;
  ctx.fillRect(x-5, y-50, 10, 100);
  ctx.strokeRect(x-5, y-50, 10, 100);

  // Inner square on backboard
  ctx.strokeStyle = '#a855f7';
  ctx.lineWidth   = 1;
  ctx.strokeRect(x-5, y-16, 10, 32);

  // Arm from backboard to rim
  ctx.strokeStyle = 'rgba(168,85,247,.6)';
  ctx.lineWidth   = 2;
  ctx.beginPath(); ctx.moveTo(x + ad*5, y); ctx.lineTo(rimX, y); ctx.stroke();

  // Rim (full circle — glowing orange)
  ctx.shadowBlur   = h.scoreTimer > 0 ? 30 : 10;
  ctx.shadowColor  = h.scoreTimer > 0 ? '#f0abfc' : '#f97316';
  ctx.strokeStyle  = h.scoreTimer > 0 ? '#e879f9' : '#f97316';
  ctx.lineWidth    = 3.5;
  ctx.beginPath(); ctx.arc(rimX, rimY, HOOP_R, 0, Math.PI*2); ctx.stroke();

  // Net — vertical strings
  ctx.shadowBlur   = 0;
  ctx.strokeStyle  = 'rgba(255,255,255,.55)';
  ctx.lineWidth    = 1;
  const segs = 7;
  for(let i=0; i<=segs; i++){
    const nx1 = rimX - HOOP_R + (i * HOOP_R*2/segs);
    const spread = (1 - Math.abs(i - segs/2) / (segs/2)) * 0.3;
    const nx2 = rimX + (nx1 - rimX) * (0.5 - spread);
    ctx.beginPath();
    ctx.moveTo(nx1, rimY + HOOP_R);
    ctx.lineTo(nx2, rimY + HOOP_R + 26);
    ctx.stroke();
  }
  // Horizontal net rings
  for(let j=1; j<=3; j++){
    const t   = j/3;
    const netY = rimY + HOOP_R + t * 26;
    const netW = HOOP_R * (1 - t*0.55);
    ctx.beginPath();
    ctx.moveTo(rimX - netW, netY);
    ctx.lineTo(rimX + netW, netY);
    ctx.stroke();
  }

  // Score flash text
  if(h.scoreTimer > 40){
    ctx.font = '700 16px Courier New';
    ctx.fillStyle = `rgba(192,132,252,${(h.scoreTimer-40)/20})`;
    ctx.textAlign = 'center';
    ctx.fillText('+1', rimX, rimY - HOOP_R - 12);
    ctx.textAlign = 'left';
  }

  ctx.restore();
}

// Returns the rim center [x,y] for a hoop
function rimPos(h){ return [h.sx + h.armDir * 30, h.sy]; }

// ── Throw basketball ──────────────────────────────────────────────────
function throwBall(){
  const heroSX = worldToScreen(hero.x + hero.w/2);
  const heroSY = hero.y + hero.h/2 - 30;

  // Aim toward closest hoop
  const [lx,ly] = rimPos(hoops[0]);
  const [rx,ry] = rimPos(hoops[1]);
  const distL   = Math.hypot(heroSX-lx, heroSY-ly);
  const distR   = Math.hypot(heroSX-rx, heroSY-ry);
  const target  = distL < distR ? hoops[0] : hoops[1];
  const [tx,ty] = rimPos(target);

  const dx   = tx - heroSX;
  const dy   = ty - heroSY;
  const dist = Math.hypot(dx, dy);
  const spd  = Math.min(18, dist * 0.07 + 10);
  const vx   = (dx/dist) * spd;
  // Arc: launch upward enough to arc over
  const vy = (dy/dist) * spd - Math.abs(dx/dist) * 7 - 3;

  balls.push({
    x: heroSX, y: heroSY,
    vx, vy,
    r: BALL_R,
    trail: [],
    scored: false,
    alive: true,
    age: 0,
    spin: 0,
  });
}

function updateBalls(){
  for(let i=balls.length-1; i>=0; i--){
    const b = balls[i];
    b.age++;
    b.spin += b.vx * 0.05;

    // Save trail position
    b.trail.push({x:b.x, y:b.y});
    if(b.trail.length > 22) b.trail.shift();

    // Physics
    b.vy += 0.4;
    b.x  += b.vx;
    b.y  += b.vy;
    b.vx *= 0.995;

    // Score check
    if(!b.scored){
      hoops.forEach((h,hi)=>{
        const [rx,ry] = rimPos(h);
        const dist = Math.hypot(b.x - rx, b.y - ry);
        // Ball passes through rim center moving downward
        if(dist < HOOP_R - b.r * 0.5 && b.vy > 1 && !h.scored){
          b.scored = true;
          h.scored = true;
          h.scoreTimer = 80;
          if(hi===0){ scores.left++;  scoreEls.left.textContent  = scores.left; }
          else       { scores.right++; scoreEls.right.textContent = scores.right; }
          // Pop animation
          const el = hi===0 ? scoreEls.left : scoreEls.right;
          el.classList.add('pop');
          setTimeout(()=>el.classList.remove('pop'), 300);
        }
      });
    }

    // Bounce off walls (screen edges)
    if(b.x < b.r)     { b.x = b.r;    b.vx *= -0.65; }
    if(b.x > W - b.r) { b.x = W-b.r;  b.vx *= -0.65; }

    // Remove if off bottom or stale
    if(b.y > H + 80 || b.age > 400) balls.splice(i, 1);
  }
}

function drawBalls(){
  balls.forEach(b=>{
    // ── Fireball trail ──
    b.trail.forEach((pos,i)=>{
      const t = i / b.trail.length;
      // Fireball: bright white-pink core → orange → deep purple tail
      let r, g, bl;
      if(t < 0.25){      r=255; g=220; bl=255; }   // white-pink
      else if(t < 0.55){ const f=(t-.25)/.3;
        r=Math.floor(255-f*87); g=Math.floor(220-f*135); bl=255; }  // → purple
      else {             r=168; g=85;  bl=247; }    // deep purple
      const alpha = t * 0.82;
      const size  = t * b.r * 1.5;
      if(size < 0.5) return;
      // Outer bloom
      ctx.beginPath(); ctx.arc(pos.x, pos.y, size*1.8, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${r},${g},${bl},${alpha*.35})`; ctx.fill();
      // Core
      ctx.beginPath(); ctx.arc(pos.x, pos.y, size, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${r},${g},${bl},${alpha})`; ctx.fill();
    });

    // ── Basketball body ──
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.spin);

    ctx.shadowBlur  = 22;
    ctx.shadowColor = '#c084fc';

    // Radial gradient
    const grad = ctx.createRadialGradient(-b.r*.3,-b.r*.35,b.r*.05, 0,0,b.r);
    grad.addColorStop(0, '#f5d0fe');
    grad.addColorStop(0.4, '#a855f7');
    grad.addColorStop(1,   '#2e1065');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.fill();

    // Outer ring glow
    ctx.strokeStyle = 'rgba(240,171,252,.6)';
    ctx.lineWidth   = 1.2;
    ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.stroke();

    // Basketball seams
    ctx.shadowBlur  = 0;
    ctx.strokeStyle = 'rgba(0,0,0,.38)';
    ctx.lineWidth   = 1.3;
    // Horizontal curves
    ctx.beginPath(); ctx.moveTo(-b.r,0); ctx.quadraticCurveTo(0,-b.r*.42,b.r,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-b.r,0); ctx.quadraticCurveTo(0,b.r*.42,b.r,0); ctx.stroke();
    // Vertical seam
    ctx.beginPath(); ctx.moveTo(0,-b.r); ctx.quadraticCurveTo(b.r*.42,0,0,b.r); ctx.stroke();

    ctx.restore();
  });
}

// ══════════════════════════════════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════════════════════════════════
const keys = {};
let isFlying  = false;
let lastSpaceTs = 0;
const flyBadge = document.getElementById('flyBadge');

window.addEventListener('keydown', e=>{
  keys[e.code] = true;
  if(e.code === 'Space'){
    const now = Date.now();
    if(now - lastSpaceTs < 320){
      isFlying = !isFlying;
      flyBadge.style.display = isFlying ? 'block' : 'none';
      if(isFlying) hero.vy = -6;
    }
    lastSpaceTs = now;
  }
  if(e.code === 'KeyF' || e.code === 'KeyB'){
    throwBall();
  }
  if(e.code === 'KeyE' || e.code === 'Enter'){
    document.getElementById('vaultWrap').click();
  }
});
window.addEventListener('keyup', e=>{ delete keys[e.code]; });

window.addEventListener('wheel', e=>{
  e.preventDefault();
  hero.vx += e.deltaX * 0.05;
  if(isFlying) hero.vy += e.deltaY * 0.05;
  else hero.vx += e.deltaY * 0.03;
  hero.vx = Math.max(-10, Math.min(10, hero.vx));
  if(isFlying) hero.vy = Math.max(-10, Math.min(10, hero.vy));
}, {passive:false});

// Click canvas to throw too
canvas.addEventListener('click', e=>{
  // Don't throw if over vault
  throwBall();
});

// ══════════════════════════════════════════════════════════════════════
// GAME LOOP
// ══════════════════════════════════════════════════════════════════════
let frame = 0;
let vaultOpened = false;

function loop(){
  requestAnimationFrame(loop);
  frame++;

  stepRain();

  ctx.fillStyle = '#050010';
  ctx.fillRect(0,0,W,H);
  ctx.drawImage(rainCanvas,0,0);

  drawWorld(frame);

  // ── Hero physics ──────────────────────────────────────────────────
  const ml  = keys['ArrowLeft']  || keys['KeyA'];
  const mr  = keys['ArrowRight'] || keys['KeyD'];
  const mup = keys['ArrowUp']    || keys['KeyW'];
  const mdn = keys['ArrowDown']  || keys['KeyS'];
  const SPEED=5.5, FRIC=0.80;

  if(ml)      { hero.vx=-SPEED; hero.facing=-1; }
  else if(mr) { hero.vx=SPEED;  hero.facing=1; }
  else          hero.vx *= FRIC;
  if(Math.abs(hero.vx)<0.15) hero.vx=0;

  if(isFlying){
    if(mup)      hero.vy = -6;
    else if(mdn) hero.vy =  6;
    else         hero.vy *= 0.78;
    if(Math.abs(hero.vy)<0.15) hero.vy=0;
    hero.x += hero.vx; hero.y += hero.vy;
    if(hero.x>WORLD_W)  hero.x=-hero.w;
    if(hero.x<-hero.w)  hero.x=WORLD_W;
    if(hero.y>H)        hero.y=-hero.h;
    if(hero.y<-hero.h)  hero.y=H;
    hero.onGround=false;
    hero.state=Math.abs(hero.vx)>.5||Math.abs(hero.vy)>.5?'walk':'idle';
  } else {
    if(keys['Space'] && hero.onGround){ hero.vy=-15; hero.onGround=false; }
    hero.vy+=0.65; hero.x+=hero.vx; hero.y+=hero.vy;
    const gnd=GROUND()-hero.h;
    if(hero.y>=gnd){ hero.y=gnd; hero.vy=0; hero.onGround=true; }
    hero.x=Math.max(0,Math.min(WORLD_W-hero.w,hero.x));
    if(!hero.onGround)           hero.state='jump';
    else if(Math.abs(hero.vx)>.5) hero.state='walk';
    else                          hero.state='idle';
  }
  if(hero.kickTimer>0){ hero.state='kick'; hero.kickTimer--; }
  hero.frame++;

  updateCamera();

  // ── Basketball ────────────────────────────────────────────────────
  updateHoops();
  updateBalls();

  drawGround();
  drawHero();

  // Draw hoops (screen space — after canvas transforms reset)
  ctx.save(); ctx.setTransform(1,0,0,1,0,0);
  hoops.forEach(drawHoop);
  drawBalls();
  ctx.restore();
}

// ── Vault ─────────────────────────────────────────────────────────────
document.getElementById('vaultWrap').addEventListener('click', ()=>{
  if(vaultOpened) return;
  vaultOpened=true;
  hero.vy=-18; hero.kickTimer=40;
  const ov=document.getElementById('vaultOverlay');
  const sub=document.getElementById('vcSub');
  if(_auth) sub.textContent=_auth.level+' — LOADING COMMAND BRIDGE';
  setTimeout(()=>{
    ov.classList.add('open');
    setTimeout(()=>document.getElementById('vcFill').style.width='100%',100);
    setTimeout(()=>window.location.href='index.html',2300);
  },600);
});

// ── Init ──────────────────────────────────────────────────────────────
resize();
initRain();
initHoops();
loop();
</script>
